name: Development

on: workflow_dispatch

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  version:
    name: Version
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Version
      id: version
      shell: bash
      run: |
        echo "Runnning"

  build:
    name: Build
    needs: version
    uses: ./.github/workflows/_job_build.yml
    with:
      name: Proton-Rocksmith.2014

